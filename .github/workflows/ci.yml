name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  clippy:
    name: clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy for backend, shared, and CLI
        run: cargo clippy -p static-flow-shared -p static-flow-backend -p sf-cli --tests -- -D warnings

      - name: Run clippy for frontend (wasm)
        run: cargo clippy -p static-flow-frontend --target wasm32-unknown-unknown -- -D warnings

  test:
    name: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Full history so the affected-crate selector can diff base..head.
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests for affected crates
        # Test only the workspace crates this PR touches (plus their
        # dependents); fall back to the full workspace for cross-cutting
        # changes. See scripts/ci_test_affected.py.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 scripts/ci_test_affected.py
